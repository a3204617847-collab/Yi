<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f0f23; min-height: 100vh; overflow-x: hidden; }

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useRef, useEffect } = React;



// ========== CHARACTER SYSTEM ==========
const HAIR_COLORS=[{id:"black",name:"黑色",color:"#1a1a2e",hl:"#2d2d4a"},{id:"brown",name:"棕色",color:"#5c3a1e",hl:"#7a5230"},{id:"purple",name:"紫色",color:"#6b21a8",hl:"#9333ea"},{id:"blue",name:"蓝色",color:"#1e40af",hl:"#3b82f6"},{id:"pink",name:"粉色",color:"#be185d",hl:"#ec4899"},{id:"red",name:"红色",color:"#991b1b",hl:"#ef4444"},{id:"silver",name:"银白",color:"#9ca3af",hl:"#e5e7eb"},{id:"green",name:"绿色",color:"#166534",hl:"#22c55e"}];
const HAIR_M=[{id:"short1",name:"干练短发"},{id:"spiky",name:"竖刺头"},{id:"middle",name:"中分微卷"},{id:"wolfcut",name:"狼尾"},{id:"undercut",name:"侧削"},{id:"messy",name:"凌乱感"},{id:"slickback",name:"大背头"}];
const HAIR_F=[{id:"long1",name:"直长发"},{id:"ponytail",name:"高马尾"},{id:"twintail",name:"双马尾"},{id:"bob",name:"短波波头"},{id:"wavy",name:"大波浪"},{id:"bun",name:"丸子头"},{id:"pixie",name:"精灵短发"}];
const EYE_COLORS=[{id:"blue",c:"#3b82f6"},{id:"green",c:"#22c55e"},{id:"amber",c:"#f59e0b"},{id:"purple",c:"#a855f7"},{id:"red",c:"#ef4444"},{id:"cyan",c:"#06b6d4"}];
const ACCS=[{id:"none",name:"无"},{id:"glasses",name:"眼镜"},{id:"catear",name:"猫耳"},{id:"headphone",name:"耳机"},{id:"hairpin",name:"发夹"},{id:"cap",name:"鸭舌帽"}];

function CharAvatar({g="M",hair,hc:hcId,ec:ecId,acc="none",tier=0,size=120,showBg=true}){
  const hc=HAIR_COLORS.find(h=>h.id===hcId)||HAIR_COLORS[0];
  const ec=EYE_COLORS.find(e=>e.id===ecId)||EYE_COLORS[0];
  const isM=g==="M";
  const oc=[{t:"#6b7280",b:"#374151"},{t:"#7c3aed",b:"#4c1d95"},{t:"#1e40af",b:"#1e3a5f"},{t:"#1f2937",b:"#111827"},{t:"#7c2d12",b:"#451a03"},{t:"#4a1942",b:"#2d1033"}][Math.min(tier,5)];
  const mHair=()=>{switch(hair){
    case "spiky":return <><path d="M32 38C32 22,68 22,68 38L65 30 60 20 55 28 50 16 45 26 40 18 35 28 32 38Z" fill={hc.color}/><path d="M50 16L48 26 52 26Z" fill={hc.hl} opacity=".5"/></>;
    case "middle":return <><path d="M30 42C30 24,70 24,70 42C70 38,65 32,60 30 55 28,52 24,50 22 48 24,45 28,40 30 35 32,30 38,30 42Z" fill={hc.color}/></>;
    case "wolfcut":return <><path d="M30 42C30 22,70 22,70 42L72 55 70 48 68 58 65 45 62 42 38 42 35 45 32 58 30 48 28 55Z" fill={hc.color}/></>;
    case "undercut":return <><path d="M32 42C32 32,42 24,50 22 58 24,68 32,68 42L68 46 32 46Z" fill={hc.color}/><path d="M32 42L32 48C32 46,34 44,36 44L64 44C66 44,68 46,68 48L68 42" fill="#1a1a2e" opacity=".4"/></>;
    case "messy":return <><path d="M28 42C28 20,72 20,72 42 72 38,70 34,68 38 66 30,62 24,58 22 60 28,56 34,54 30 52 24,48 20,46 22 44 26,42 30,40 28 38 24,34 28,32 34 30 30,28 36,28 42Z" fill={hc.color}/></>;
    case "slickback":return <><path d="M30 44C30 24,70 24,70 44 70 40,68 36,66 38 66 30,62 26,56 24 52 22,48 22,44 24 38 26,34 30,34 38 32 36,30 40,30 44Z" fill={hc.color}/></>;
    default:return <><path d="M32 42C32 26,68 26,68 42L66 38C64 30,56 26,50 26 44 26,36 30,34 38Z" fill={hc.color}/></>;
  }};
  // Female hair: back layer (drawn BEHIND face) - long flowing parts
  const fHairBack=()=>{switch(hair){
    case "ponytail":return <ellipse cx="66" cy="35" rx="6" ry="18" fill={hc.color} transform="rotate(20,66,35)"/>;
    case "twintail":return <><ellipse cx="26" cy="46" rx="6" ry="20" fill={hc.color}/><ellipse cx="74" cy="46" rx="6" ry="20" fill={hc.color}/></>;
    case "bob":return null;
    case "wavy":return <><path d="M26 38C24 50,24 62,28 70C30 74,34 76,38 72C40 68,40 62,42 58" fill={hc.color}/><path d="M74 38C76 50,76 62,72 70C70 74,66 76,62 72C60 68,60 62,58 58" fill={hc.color}/></>;
    case "bun":return <circle cx="50" cy="20" r="10" fill={hc.color}/>;
    case "pixie":return null;
    default:return <><path d="M24 38C22 52,22 66,26 76L34 76C30 66,28 52,28 38" fill={hc.color}/><path d="M76 38C78 52,78 66,74 76L66 76C70 66,72 52,72 38" fill={hc.color}/></>;
  }};
  // Female hair: front layer (drawn OVER face) - top/bangs only
  const fHairFront=()=>{switch(hair){
    case "ponytail":return <><path d="M30 40C30 22,70 22,70 40L68 36C66 28,58 24,50 24 42 24,34 28,32 36Z" fill={hc.color}/><path d="M34 34C36 30,42 26,50 24" stroke={hc.hl} strokeWidth="2" fill="none" opacity=".3"/></>;
    case "twintail":return <><path d="M30 40C30 22,70 22,70 40L68 36C66 28,58 24,50 24 42 24,34 28,32 36Z" fill={hc.color}/><path d="M34 34C36 30,42 26,50 24" stroke={hc.hl} strokeWidth="2" fill="none" opacity=".3"/></>;
    case "bob":return <><path d="M28 38C28 22,72 22,72 38" fill={hc.color}/><path d="M28 38L26 52C26 58,30 60,34 58L34 42" fill={hc.color}/><path d="M72 38L74 52C74 58,70 60,66 58L66 42" fill={hc.color}/></>;
    case "wavy":return <><path d="M28 40C28 20,72 20,72 40L70 36C68 28,58 24,50 24 42 24,32 28,30 36Z" fill={hc.color}/><path d="M36 32C40 26,46 22,50 24" stroke={hc.hl} strokeWidth="2" fill="none" opacity=".3"/></>;
    case "bun":return <><path d="M30 40C30 24,70 24,70 40L68 36C66 28,58 24,50 24 42 24,34 28,32 36Z" fill={hc.color}/><circle cx="50" cy="18" r="4" fill={hc.hl} opacity=".2"/></>;
    case "pixie":return <><path d="M30 42C30 26,70 26,70 42 70 38,66 32,60 30 55 28,52 24,50 22 46 26,40 30,34 34 30 38,30 42,30 42Z" fill={hc.color}/><path d="M50 22C46 26,38 32,32 38" stroke={hc.hl} strokeWidth="2" fill="none" opacity=".3"/></>;
    default:return <><path d="M26 40C26 20,74 20,74 40L72 36C70 28,60 22,50 22 40 22,30 28,28 36Z" fill={hc.color}/><path d="M50 22C40 22,32 28,28 36" stroke={hc.hl} strokeWidth="2" fill="none" opacity=".3"/></>;
  }};
  const accR=()=>{switch(acc){
    case "glasses":return <><rect x="36" y="44" width="11" height="9" rx="3" fill="none" stroke="#d4d4d8" strokeWidth="1.5"/><rect x="53" y="44" width="11" height="9" rx="3" fill="none" stroke="#d4d4d8" strokeWidth="1.5"/><line x1="47" y1="48" x2="53" y2="48" stroke="#d4d4d8" strokeWidth="1.2"/></>;
    case "catear":return <><path d="M32 32L28 18 40 28Z" fill={hc.color}/><path d="M68 32L72 18 60 28Z" fill={hc.color}/><path d="M32 30L30 22 38 28Z" fill="#fda4af" opacity=".6"/><path d="M68 30L70 22 62 28Z" fill="#fda4af" opacity=".6"/></>;
    case "headphone":return <><path d="M28 44C28 30,72 30,72 44" fill="none" stroke="#6b7280" strokeWidth="3"/><rect x="24" y="42" width="8" height="12" rx="4" fill="#4b5563"/><rect x="68" y="42" width="8" height="12" rx="4" fill="#4b5563"/></>;
    case "hairpin":return <><line x1="62" y1="34" x2="68" y2="30" stroke="#e879f9" strokeWidth="2" strokeLinecap="round"/><circle cx="69" cy="29" r="2.5" fill="#e879f9"/></>;
    case "cap":return <><path d="M28 38C28 28,72 28,72 38L74 40 26 40Z" fill="#4b5563"/><rect x="26" y="38" width="48" height="4" rx="1" fill="#374151"/></>;
    default:return null;
  }};
  const outfit=()=>{
    if(tier<=1)return <><path d="M30 72C30 66,38 62,50 62 62 62,70 66,70 72L70 90 30 90Z" fill={oc.t}/><path d="M42 62L42 70C42 72,46 74,50 74 54 74,58 72,58 70L58 62" fill={oc.b}/></>;
    if(tier===2)return <><path d="M30 72C30 66,38 62,50 62 62 62,70 66,70 72L70 90 30 90Z" fill={oc.t}/><path d="M46 62L46 66 50 70 54 66 54 62" fill="#f8fafc"/><path d="M48 66L50 82 52 66" fill="#ef4444"/></>;
    if(tier===3)return <><path d="M30 72C30 66,38 62,50 62 62 62,70 66,70 72L70 90 30 90Z" fill={oc.t}/><path d="M50 62L44 72 44 90 56 90 56 72Z" fill={oc.b}/><path d="M49 68L50 80 51 68" fill="#1e40af"/></>;
    return <><path d="M28 72C28 64,38 60,50 60 62 60,72 64,72 72L72 90 28 90Z" fill={oc.t}/><path d="M50 60L42 72 42 90 58 90 58 72Z" fill={oc.b}/><path d="M49 66L50 78 51 66" fill="#c084fc"/></>;
  };
  return(<svg width={size} height={size} viewBox="0 0 100 100" style={{overflow:"visible"}}>
    {showBg&&<circle cx="50" cy="50" r="48" fill="rgba(192,132,252,.06)" stroke="rgba(192,132,252,.15)" strokeWidth="1"/>}
    {/* Back hair layer (behind face) for female long styles */}
    {!isM&&fHairBack()}
    <rect x="44" y="60" width="12" height="8" rx="3" fill="#fcd5b8"/>{outfit()}
    <ellipse cx="50" cy="48" rx="18" ry="20" fill="#fcd5b8"/>
    <ellipse cx="42" cy="48" rx="3.5" ry="4" fill="#fff"/><ellipse cx="58" cy="48" rx="3.5" ry="4" fill="#fff"/>
    <ellipse cx="42.5" cy="48.5" rx="2.2" ry="2.5" fill={ec.c}/><ellipse cx="58.5" cy="48.5" rx="2.2" ry="2.5" fill={ec.c}/>
    <ellipse cx="43" cy="47.5" rx="1" ry="1" fill="#fff" opacity=".8"/><ellipse cx="59" cy="47.5" rx="1" ry="1" fill="#fff" opacity=".8"/>
    <path d={isM?"M37 42C39 40,45 40,47 42":"M37 43C39 41,45 41,47 42"} fill="none" stroke={hc.color} strokeWidth={isM?"1.8":"1.2"} strokeLinecap="round"/>
    <path d={isM?"M53 42C55 40,61 40,63 42":"M53 42C55 41,61 41,63 42"} fill="none" stroke={hc.color} strokeWidth={isM?"1.8":"1.2"} strokeLinecap="round"/>
    <path d="M49 52C49 53,51 53,51 52" fill="none" stroke="#deb896" strokeWidth="1" strokeLinecap="round"/>
    <path d={isM?"M44 57C46 59,54 59,56 57":"M45 57C47 60,53 60,55 57"} fill="none" stroke="#d4886b" strokeWidth="1.2" strokeLinecap="round"/>
    {!isM&&<><ellipse cx="36" cy="54" rx="4" ry="2.5" fill="#fda4af" opacity=".25"/><ellipse cx="64" cy="54" rx="4" ry="2.5" fill="#fda4af" opacity=".25"/></>}
    {/* Front hair layer (over face) - bangs/top */}
    {isM?mHair():fHairFront()}{accR()}
  </svg>);
}

// ========== VEHICLE & HOUSING SVG ILLUSTRATIONS ==========
function CarSVG({tier=0,size=48}){
  const s=size;const v=`0 0 80 50`;
  // tier: 0=无车(地铁) 1=两轮 2=代步 3=家用 4=豪华 5=超豪华 6=超跑
  switch(tier){
    case 0:return(<svg width={s} height={s*0.625} viewBox={v}><rect x="5" y="10" width="70" height="30" rx="8" fill="#4b5563"/><rect x="10" y="14" width="18" height="12" rx="2" fill="#38bdf8" opacity=".3"/><rect x="32" y="14" width="18" height="12" rx="2" fill="#38bdf8" opacity=".3"/><rect x="54" y="14" width="18" height="12" rx="2" fill="#38bdf8" opacity=".3"/><rect x="5" y="38" width="70" height="4" rx="1" fill="#6b7280"/><circle cx="20" cy="44" r="4" fill="#374151" stroke="#6b7280" strokeWidth="1"/><circle cx="60" cy="44" r="4" fill="#374151" stroke="#6b7280" strokeWidth="1"/><rect x="30" y="5" width="20" height="6" rx="2" fill="#818cf8"/><text x="40" y="10" textAnchor="middle" fontSize="5" fill="#fff" fontWeight="700">METRO</text></svg>);
    case 1:return(<svg width={s} height={s*0.625} viewBox={v}><circle cx="25" cy="35" r="10" fill="none" stroke="#6b7280" strokeWidth="2.5"/><circle cx="55" cy="35" r="10" fill="none" stroke="#6b7280" strokeWidth="2.5"/><path d="M25 35L35 20L50 18L55 35" fill="none" stroke="#22c55e" strokeWidth="2.5" strokeLinejoin="round"/><path d="M35 20L38 28L50 28L50 18" fill="#22c55e" opacity=".3"/><rect x="48" y="14" width="6" height="4" rx="1" fill="#fbbf24"/><circle cx="25" cy="35" r="3" fill="#374151"/><circle cx="55" cy="35" r="3" fill="#374151"/></svg>);
    case 2:return(<svg width={s} height={s*0.625} viewBox={v}><path d="M15 32C15 32,18 18,25 16L55 16C62 18,65 32,65 32Z" fill="#60a5fa"/><path d="M20 18L22 28L58 28L60 18Z" fill="#bfdbfe" opacity=".5"/><rect x="12" y="30" width="56" height="12" rx="4" fill="#3b82f6"/><circle cx="24" cy="44" r="5" fill="#1e293b" stroke="#64748b" strokeWidth="1.5"/><circle cx="56" cy="44" r="5" fill="#1e293b" stroke="#64748b" strokeWidth="1.5"/><circle cx="24" cy="44" r="2" fill="#475569"/><circle cx="56" cy="44" r="2" fill="#475569"/><rect x="14" y="32" width="8" height="3" rx="1" fill="#fbbf24"/><rect x="58" y="32" width="8" height="3" rx="1" fill="#ef4444"/></svg>);
    case 3:return(<svg width={s} height={s*0.625} viewBox={v}><path d="M12 30C12 30,16 14,24 12L56 12C64 14,68 30,68 30Z" fill="#e2e8f0"/><path d="M20 14L22 26L58 26L60 14Z" fill="#94a3b8" opacity=".4"/><line x1="40" y1="14" x2="40" y2="26" stroke="#cbd5e1" strokeWidth=".8"/><rect x="8" y="28" width="64" height="14" rx="5" fill="#cbd5e1"/><path d="M8 34L16 34L14 38L8 38Z" fill="#fbbf24"/><path d="M72 34L64 34L66 38L72 38Z" fill="#ef4444"/><circle cx="22" cy="44" r="6" fill="#1e293b" stroke="#64748b" strokeWidth="2"/><circle cx="58" cy="44" r="6" fill="#1e293b" stroke="#64748b" strokeWidth="2"/><circle cx="22" cy="44" r="2.5" fill="#475569"/><circle cx="58" cy="44" r="2.5" fill="#475569"/><rect x="32" y="10" width="16" height="2" rx="1" fill="#64748b"/></svg>);
    case 4:return(<svg width={s} height={s*0.625} viewBox={v}><path d="M10 30C10 30,14 12,24 10L56 10C66 12,70 30,70 30Z" fill="#1e293b"/><path d="M18 13L21 26L59 26L62 13Z" fill="#334155" opacity=".5"/><line x1="40" y1="13" x2="40" y2="26" stroke="#475569" strokeWidth=".8"/><rect x="6" y="28" width="68" height="14" rx="5" fill="#0f172a"/><path d="M6 32L14 31L12 38L6 37Z" fill="#fbbf24"/><path d="M74 32L66 31L68 38L74 37Z" fill="#ef4444"/><circle cx="20" cy="44" r="6" fill="#0f172a" stroke="#818cf8" strokeWidth="1.5"/><circle cx="60" cy="44" r="6" fill="#0f172a" stroke="#818cf8" strokeWidth="1.5"/><circle cx="20" cy="44" r="2.5" fill="#818cf8" opacity=".4"/><circle cx="60" cy="44" r="2.5" fill="#818cf8" opacity=".4"/><path d="M30 28L30 32L50 32L50 28" fill="none" stroke="#818cf8" strokeWidth=".5" opacity=".4"/></svg>);
    case 5:return(<svg width={s} height={s*0.625} viewBox={v}><path d="M8 30C8 30,14 10,26 8L54 8C66 10,72 30,72 30Z" fill="#1c1917"/><path d="M18 11L21 26L59 26L62 11Z" fill="#292524" opacity=".6"/><line x1="40" y1="11" x2="40" y2="26" stroke="#44403c" strokeWidth=".8"/><rect x="4" y="28" width="72" height="14" rx="6" fill="#0c0a09"/><path d="M4 32L14 31L11 38L4 37Z" fill="#fbbf24"/><path d="M76 32L66 31L69 38L76 37Z" fill="#ef4444"/><circle cx="18" cy="44" r="6.5" fill="#0c0a09" stroke="#c084fc" strokeWidth="1.5"/><circle cx="62" cy="44" r="6.5" fill="#0c0a09" stroke="#c084fc" strokeWidth="1.5"/><circle cx="18" cy="44" r="3" fill="#c084fc" opacity=".3"/><circle cx="62" cy="44" r="3" fill="#c084fc" opacity=".3"/><rect x="28" y="6" width="24" height="3" rx="1.5" fill="#c084fc" opacity=".2"/></svg>);
    default:return(<svg width={s} height={s*0.625} viewBox={v}><path d="M5 28C5 28,10 6,22 4L58 4C70 6,75 28,75 28Z" fill="#dc2626"/><path d="M16 7L19 24L61 24L64 7Z" fill="#1e293b" opacity=".7"/><line x1="40" y1="7" x2="40" y2="24" stroke="#374151" strokeWidth=".8"/><rect x="2" y="26" width="76" height="16" rx="6" fill="#991b1b"/><path d="M2 30L12 29L9 36L2 35Z" fill="#fbbf24"/><path d="M78 30L68 29L71 36L78 35Z" fill="#fbbf24"/><circle cx="16" cy="44" r="7" fill="#0f172a" stroke="#fbbf24" strokeWidth="2"/><circle cx="64" cy="44" r="7" fill="#0f172a" stroke="#fbbf24" strokeWidth="2"/><circle cx="16" cy="44" r="3" fill="#fbbf24" opacity=".3"/><circle cx="64" cy="44" r="3" fill="#fbbf24" opacity=".3"/><path d="M26 26L26 30L54 30L54 26" fill="none" stroke="#fbbf24" strokeWidth=".8" opacity=".3"/><rect x="32" y="2" width="16" height="3" rx="1.5" fill="#fbbf24" opacity=".4"/></svg>);
  }
}
function HouseSVG({tier=0,size=48}){
  const s=size;const v=`0 0 70 60`;
  // tier: 0=合租 1=租房 2=独租 3=买房 4=豪宅 5=别墅
  switch(tier){
    case 0:return(<svg width={s} height={s*0.857} viewBox={v}><rect x="5" y="15" width="60" height="40" rx="2" fill="#4b5563"/><rect x="10" y="20" width="10" height="10" rx="1" fill="#fbbf24" opacity=".3"/><rect x="24" y="20" width="10" height="10" rx="1" fill="#fbbf24" opacity=".3"/><rect x="38" y="20" width="10" height="10" rx="1" fill="#fbbf24" opacity=".2"/><rect x="52" y="20" width="10" height="10" rx="1" fill="#fbbf24" opacity=".3"/><rect x="10" y="35" width="10" height="10" rx="1" fill="#fbbf24" opacity=".2"/><rect x="24" y="35" width="10" height="10" rx="1" fill="#fbbf24" opacity=".3"/><rect x="38" y="35" width="10" height="10" rx="1" fill="#fbbf24" opacity=".3"/><rect x="52" y="35" width="10" height="10" rx="1" fill="#fbbf24" opacity=".2"/><rect x="28" y="48" width="14" height="12" rx="1" fill="#374151"/><rect x="5" y="12" width="60" height="5" rx="1" fill="#6b7280"/></svg>);

function ItemImg({name,type="car",tier=0,size=48}){
  const imgs=type==="car"?CAR_IMAGES:HOUSING_IMAGES;
  const src=imgs[name];
  if(src)return <img src={src} alt={name} style={{width:size,height:"auto",borderRadius:6,objectFit:"cover"}}/>;
  if(type==="car")return <CarItemSVG name={name} tier={tier} size={size}/>;
  return <HouseSVG tier={tier} size={size}/>;
}

// Floating orbs background component
function Orbs({count=6}){
  const orbs = useRef(Array.from({length:count},(_,i)=>({
    x:Math.random()*100, y:Math.random()*100,
    size:40+Math.random()*80,
    color:[T.neon1,T.neon2,T.neon3,T.neon4,T.accent,"#6366f1"][i%6],
    dur:8+Math.random()*12, delay:Math.random()*5,
  }))).current;
  return(
    <div style={{position:"fixed",inset:0,overflow:"hidden",pointerEvents:"none",zIndex:0}}>
      {orbs.map((o,i)=>(
        <div key={i} style={{
          position:"absolute",left:`${o.x}%`,top:`${o.y}%`,
          width:o.size,height:o.size,borderRadius:"50%",
          background:`radial-gradient(circle,${o.color}20 0%,transparent 70%)`,
          filter:`blur(${o.size/3}px)`,
          animation:`orbFloat ${o.dur}s ease-in-out ${o.delay}s infinite`,
        }}/>
      ))}
      {/* Grid lines */}
      <div style={{position:"absolute",inset:0,backgroundImage:`
        linear-gradient(rgba(192,132,252,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(192,132,252,.03) 1px, transparent 1px)
      `,backgroundSize:"60px 60px",animation:"breathe 6s ease-in-out infinite"}}/>
    </div>
  );
}

function AnimNum({value,prefix="",color="#fff"}){
  const [flash,setFlash]=useState(null);const prev=useRef(value);
  useEffect(()=>{if(prev.current!==value){setFlash(value>prev.current?"up":"down");prev.current=value;const t=setTimeout(()=>setFlash(null),800);return()=>clearTimeout(t);}},[value]);
  return(<div style={{position:"relative",display:"inline-block"}}>
    <span style={{color:flash==="up"?T.success:flash==="down"?T.danger:color,transition:"color .3s",fontWeight:800,fontSize:"clamp(11px,3vw,14px)",animation:flash?"numB .4s":""}}>{prefix}{typeof value==="number"?(value>=1e4?fmt(value):Math.round(value).toLocaleString()):value}</span>
    {flash&&<span style={{position:"absolute",top:-12,left:"50%",transform:"translateX(-50%)",fontSize:9,fontWeight:800,color:flash==="up"?T.success:T.danger,animation:"floatA .8s forwards",pointerEvents:"none"}}>{flash==="up"?"▲":"▼"}</span>}
  </div>);
}

function Popup({children,onClose,border=T.neon1}){
  useEffect(()=>{const t=setTimeout(onClose,2500);return()=>clearTimeout(t);},[onClose]);
  return(<div style={{position:"fixed",inset:0,display:"flex",alignItems:"center",justifyContent:"center",zIndex:999,background:"rgba(0,0,0,.6)",backdropFilter:"blur(8px)",animation:"fadeIn .3s"}} onClick={onClose}>
    <div className="card" style={{border:`2px solid ${border}66`,borderRadius:24,padding:"32px 40px",textAlign:"center",animation:"popIn .5s cubic-bezier(.34,1.56,.64,1)",boxShadow:`0 0 80px ${border}22, 0 0 160px ${border}08`,maxWidth:"85vw"}} onClick={e=>e.stopPropagation()}>
      {children}
    </div>
  </div>);
}

    setInd(industry);setCash(bg.cash);setConn(bg.connections);
    setUsers(0);setTeam(1);setRep(50);setMo(1);setFr(0);setVal(bg.cash*5);setEq(100);
    setEvt(null);setHistory([]);setMiles([]);
    setOwnedH({tier:0,item:0});setOwnedC({tier:0,item:0});setOwnedL({tier:0,item:0});

    setShowShop(false);setShowHist(false);setPopup(null);setDebt(0);setDebts([]);setShowSurv(false);setShowDebt(false);setSurvCnt(0);setGreed(0);setSelOpts(new Set());

    const item=tiers[tierIdx].items[itemIdx];
    const tierData=tiers[tierIdx];
    const key=`${type}-${tierIdx}-${itemIdx}`;
    const alreadyOwned=ownedItems.has(key);
    const isCurrent=tierIdx===owned.tier&&itemIdx===owned.item;
    if(isCurrent)return; // already using this one

    if(alreadyOwned){
      // Free switch to already-owned item
      const oldTierData=tiers[owned.tier];
      const dRep=tierData.repB-oldTierData.repB;
      const dConn=tierData.connB-oldTierData.connB;
      if(dRep>0)setRep(r=>Math.min(100,r+dRep));

      const r=await fetch("https://api.deepseek.com/chat/completions",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+_dsKey},body:JSON.stringify({model:"deepseek-chat",max_tokens:150,messages:[{role:"system",content:sys},{role:"user",content:usr}]})});
      const d=await r.json();const story=d.choices?.[0]?.message?.content?.trim()||"";
      if(story)setPopup(p=>p&&p.type==="purchase"?{...p,story}:p);

          <div className="card" style={{flex:1,padding:"8px 10px",borderColor:`${T.neon1}33`}}>
            <div style={{fontSize:11,fontWeight:800,color:T.neon1}}>🏅 {name}</div>
            <div style={{fontSize:10,color:T.textDim}}>{fmtU(users)} 用户</div>
          </div>
          {comps.map((c,i)=><div key={i} className="card" style={{flex:1,padding:"8px 10px"}}>
            <div style={{fontSize:10,fontWeight:700,color:T.textDim}}>{c.name}</div>
            <div style={{fontSize:10,color:T.textMuted}}>{fmtU(c.users)}</div>
          </div>)}
        </div>
      </div>

      {/* Event */}
      <div style={{width:W,marginBottom:14}}>
        {loading?(
          <div className="card" style={{padding:"44px 20px",textAlign:"center"}}>
            <div style={{fontSize:36,marginBottom:14,animation:"float 2s ease-in-out infinite"}}>📮</div>
            <div style={{color:T.textDim,fontSize:15,fontWeight:700}}>第{mo}个月</div>
            <div style={{marginTop:8,fontSize:12,color:T.textMuted}}>事件生成中<span style={{animation:"dot 1s infinite"}}>.</span><span style={{animation:"dot 1s infinite .3s"}}>.</span><span style={{animation:"dot 1s infinite .6s"}}>.</span></div>
          </div>
        ):evt?(
          <div className="card" style={{animation:"fadeUp .5s",borderColor:`${evtColor(evt.type)}33`}}>
            <div style={{padding:"18px 18px 16px"}}>
              {/* Event header */}
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
                <span style={{fontSize:36,filter:`drop-shadow(0 0 12px ${evtColor(evt.type)}44)`}}>{evt.emoji}</span>
                <div>
                  <div className="tag" style={{display:"inline-block",background:`${evtColor(evt.type)}15`,color:evtColor(evt.type),marginBottom:4,borderRadius:6}}>{evtLabel(evt.type)}</div>
                  <div style={{fontSize:20,fontWeight:900,lineHeight:1.2}}>{evt.title}</div>
                </div>
              </div>
              {/* Description */}
              <div style={{fontSize:14,color:"rgba(255,255,255,.7)",lineHeight:1.9,marginBottom:18,padding:"14px 16px",background:`${evtColor(evt.type)}06`,borderRadius:12,borderLeft:`3px solid ${evtColor(evt.type)}44`}}>
                {evt.description}
              </div>
              {/* Multi-select hint */}
              {evt.multiSelect&&<div style={{fontSize:12,color:T.neon1,marginBottom:10,fontWeight:700,textAlign:"center",padding:"6px",background:`${T.neon1}08`,borderRadius:8}}>🔀 可多选，但贪心有代价…</div>}
              {/* Options */}
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {evt.options?.map((o,i)=>(
                  <div key={i} className="ob" onClick={()=>evt.multiSelect?setSelOpts(p=>{const n=new Set(p);n.has(i)?n.delete(i):n.add(i);return n;}):decide([o])} style={{
                    padding:"16px 18px",borderRadius:14,
                    background:evt.multiSelect&&selOpts.has(i)?`${T.neon1}10`:T.card,
                    border:`1px solid ${evt.multiSelect&&selOpts.has(i)?`${T.neon1}55`:T.cardBorder}`,
                    display:"flex",justifyContent:"space-between",alignItems:"center",
                    transition:"all .25s",
                  }}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:15,fontWeight:800,marginBottom:4,display:"flex",alignItems:"center",gap:6}}>
                        {evt.multiSelect?(selOpts.has(i)?<span style={{color:T.neon1}}>☑️</span>:<span style={{opacity:.4}}>⬜</span>):<span style={{color:T.neon1,fontSize:12}}>{"ABCD"[i]}</span>}
                        <span>{o.text}</span>
                      </div>
                      <div style={{fontSize:12,color:T.textDim,lineHeight:1.6,paddingLeft:evt.multiSelect?26:20}}>{o.detail}</div>
                    </div>
                    <div className="tag" style={{...riskStyle(o.risk),marginLeft:10,whiteSpace:"nowrap",fontWeight:700,borderRadius:8}}>
                      {{low:"低风险",medium:"中风险",high:"高风险"}[o.risk]||"?"}
                    </div>
                  </div>
                ))}
                {/* Confirm multi-select */}
                {evt.multiSelect&&selOpts.size>0&&<div style={{marginTop:14,textAlign:"center"}}>
                  <button onClick={()=>{const chosen=Array.from(selOpts).map(idx=>evt.options[idx]);setSelOpts(new Set());decide(chosen);}} className="btn-primary" style={{padding:"14px 36px",borderRadius:14,fontSize:16,letterSpacing:1}}>
                    确认选择 ({selOpts.size}项)
                  </button>
                </div>}
              </div>
            </div>
          </div>
        ):null}
      </div>

      {/* Milestone */}
      {miles.length>0&&<div style={{width:W,marginBottom:10,fontSize:12,color:T.gold,fontWeight:700,textAlign:"center",textShadow:`0 0 8px ${T.gold}33`}}>🏆 {miles[miles.length-1].text}</div>}

      {/* History toggle */}
      <button onClick={()=>setShowHist(!showHist)} className="btn-ghost" style={{padding:"8px 22px",borderRadius:12,fontSize:12,marginBottom:8}}>
        {showHist?"收起":"📜 历程"} ({history.length})
      </button>
      {showHist&&history.length>0&&<div className="card" style={{width:W,marginTop:8,maxHeight:260,overflowY:"auto",padding:14}}>
        {history.slice().reverse().map((e,i)=><div key={i} style={{fontSize:12,color:T.textDim,padding:"7px 0",borderBottom:i<history.length-1?`1px solid ${T.cardBorder}`:"none"}}>
          <span style={{color:evtColor(e.type)}}>{e.emoji} 第{e.mo}月</span> {e.title} → <span style={{color:T.neon1,fontWeight:700}}>{e.choice}</span>
        </div>)}
      </div>}
    </Page>
  );

  // --- GAME OVER ---
  if(phase==="gameover")return(
    <Page>
      <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",textAlign:"center",maxWidth:440}}>
        <div style={{animation:"fadeUp .6s"}}>
          <div style={{display:"flex",justifyContent:"center",marginBottom:12}}><Av size={80}/></div>
          <div style={{fontSize:72,marginBottom:16}}>💸</div>
          <h2 style={{fontSize:30,fontWeight:900,color:T.danger,margin:"0 0 8px"}}>创业失败</h2>
          <p style={{color:T.textDim,fontSize:14,marginBottom:24}}>{overMsg}</p>
          <div className="card" style={{padding:22,maxWidth:400,margin:"0 auto 28px",textAlign:"left",borderColor:`${T.danger}22`}}>
            <div style={{fontSize:14,color:T.textDim,lineHeight:2.4}}>
              {bg?.icon} {bg?.name} → {ind?.icon} {name}<br/>
              📅 {mo}月 · 👥 {fmtU(users)} · {team}人<br/>
              💰 {["未融资","天使轮","A轮","B轮","C轮","IPO"][fr]}<br/>
              🚗 {curC.name} · 🏠 {curH.name}<br/>
              {totalDebt>0&&<>💸 负债 ¥{fmt(totalDebt)} ({debts.length}笔)<br/></>}
              🏆 {miles.length} 个里程碑
            </div>
          </div>
          <div style={{display:"flex",gap:14,justifyContent:"center",flexWrap:"wrap"}}>
            <button onClick={()=>setPhase("menu")} className="btn-primary" style={{padding:"14px 36px",fontSize:16,borderRadius:14,background:`linear-gradient(135deg,${T.danger},#dc2626)`}}>😤 东山再起</button>
            <button onClick={()=>navigator.clipboard?.writeText(`🚀创业人生\n${bg?.icon}${bg?.name}→${ind?.icon}${name}\n坚持${mo}月后破产💸\n🚗${curC.name} 🏠${curH.name}\n你能更好吗？`)} className="btn-ghost" style={{padding:"14px 36px",fontSize:16,borderRadius:14}}>📤 分享</button>
          </div>
        </div>
      </div>
    </Page>
  );

  // --- WON ---
  if(phase==="won")return(
    <Page>
      {Array.from({length:15}).map((_,i)=><div key={i} style={{position:"fixed",left:`${Math.random()*100}%`,top:-20,fontSize:22,animation:`confetti ${3+Math.random()*3}s linear ${Math.random()*2}s infinite`,pointerEvents:"none",zIndex:2}}>{["🎉","🎊","✨","🌟","🔔","💰"][i%6]}</div>)}
      <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",textAlign:"center",maxWidth:440,position:"relative",zIndex:3}}>
        <div style={{animation:"fadeUp .6s"}}>
          <div style={{display:"flex",justifyContent:"center",marginBottom:12}}><Av size={100}/></div>
          <div style={{fontSize:72,marginBottom:16,animation:"float 3s ease-in-out infinite"}}>🔔</div>
          <h2 style={{fontSize:36,fontWeight:900,margin:"0 0 8px"}} className="neon-text">成功上市！</h2>
          <p style={{color:T.textDim,fontSize:17,marginBottom:28}}>「{name}」IPO 🎉</p>
          <div className="card card-glow" style={{padding:24,maxWidth:420,margin:"0 auto 28px",textAlign:"left"}}>
            <div style={{fontSize:15,color:"rgba(255,255,255,.75)",lineHeight:2.4}}>
              {bg?.icon} {bg?.name}（{bg?.trait}）→ {ind?.icon} {name}<br/>
              📅 {mo}月 · 💰 ¥{fmt(val)} · 持股 {eq.toFixed(1)}%<br/>
              👥 {fmtU(users)} 用户 · {team} 人 · ⭐ {Math.round(rep)}<br/>
              🚗 {curC.name} · 🏠 {curH.name} · 🍽️ {curL.name}<br/>
              🏆 {miles.length} 个里程碑
            </div>
          </div>
          <div style={{display:"flex",gap:14,justifyContent:"center",flexWrap:"wrap"}}>
            <button onClick={()=>setPhase("menu")} className="btn-primary" style={{padding:"14px 36px",fontSize:16,borderRadius:14,background:`linear-gradient(135deg,${T.gold},#f59e0b)`,color:"#0a0a1a"}}>🚀 再创辉煌</button>
            <button onClick={()=>navigator.clipboard?.writeText(`🚀创业人生🔔\n${bg?.icon}${bg?.name}→${mo}月IPO！\n「${name}」估值¥${fmt(val)}\n🚗${curC.name} 🏠${curH.name} 🍽️${curL.name}\n从${bg?.name}到CEO的逆袭！`)} style={{padding:"14px 36px",fontSize:16,fontWeight:800,color:T.gold,background:"transparent",border:`2px solid ${T.gold}44`,borderRadius:14,cursor:"pointer",fontFamily:"inherit",transition:"all .2s"}} onMouseOver={e=>e.target.style.borderColor=`${T.gold}88`} onMouseOut={e=>e.target.style.borderColor=`${T.gold}44`}>📤 敲钟炫耀</button>
          </div>
        </div>
      </div>
    </Page>
  );

  return null;
}


ReactDOM.createRoot(document.getElementById("root")).render(<StartupLifeGame />);
</script>
</body>
</html>
