function fmt(n){if(n>=1e8)return(n/1e8).toFixed(1)+"亿";if(n>=1e4)return(n/1e4).toFixed(1)+"万";return Math.round(n).toLocaleString();}
function fmtU(n){if(n>=1e8)return(n/1e8).toFixed(1)+"亿";if(n>=1e4)return(n/1e4).toFixed(1)+"万";if(n>=1e3)return(n/1e3).toFixed(1)+"千";return Math.floor(n).toString();}

function AnimNum({value,prefix="",color="#fff"}){
  const [flash,setFlash]=useState(null);const prev=useRef(value);
  useEffect(()=>{if(prev.current!==value){setFlash(value>prev.current?"up":"down");prev.current=value;const t=setTimeout(()=>setFlash(null),800);return()=>clearTimeout(t);}},[value]);
  return(<div style={{position:"relative",display:"inline-block"}}>
    <span style={{color:flash==="up"?"#34d399":flash==="down"?"#ef4444":color,transition:"color .3s",fontWeight:800,fontSize:"clamp(11px,3vw,14px)",animation:flash?"numB .4s":""}}>{prefix}{typeof value==="number"?(value>=1e4?fmt(value):Math.round(value).toLocaleString()):value}</span>
    {flash&&<span style={{position:"absolute",top:-12,left:"50%",transform:"translateX(-50%)",fontSize:9,fontWeight:800,color:flash==="up"?"#34d399":"#ef4444",animation:"floatA .8s forwards",pointerEvents:"none"}}>{flash==="up"?"▲":"▼"}</span>}
  </div>);
}

function Popup({children,onClose,border="#818cf8"}){
  useEffect(()=>{const t=setTimeout(onClose,2500);return()=>clearTimeout(t);},[onClose]);
  return(<div style={{position:"fixed",inset:0,display:"flex",alignItems:"center",justifyContent:"center",zIndex:999,background:"rgba(0,0,0,.5)",backdropFilter:"blur(4px)",animation:"fadeIn .3s"}} onClick={onClose}>
    <div style={{background:"linear-gradient(135deg,rgba(26,26,62,.95),rgba(13,27,42,.95))",border:`2px solid ${border}44`,borderRadius:20,padding:"28px 36px",textAlign:"center",animation:"popIn .5s cubic-bezier(.34,1.56,.64,1)",boxShadow:`0 0 60px ${border}22`,maxWidth:"85vw"}} onClick={e=>e.stopPropagation()}>
      {children}
    </div>
  </div>);
}

  );}

  if(phase==="industry")return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0a0a1a,#1a1a3e,#0d1b2a)",color:"#fff",fontFamily:"'Nunito',system-ui,sans-serif",display:"flex",flexDirection:"column",alignItems:"center",padding:24}}>
      <style>{CSS}</style>
      <div style={{...P,padding:"10px 18px",marginBottom:16,borderColor:bg?.color+"44",display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:24}}>{bg?.icon}</span>
        <div><div style={{fontSize:13,fontWeight:800,color:bg?.color}}>{bg?.name}</div><div style={{fontSize:11,color:"rgba(255,255,255,.4)"}}>💰¥{fmt(bg?.cash)} 🤝{bg?.connections} {bg?.trait}</div></div>
      </div>
      <div style={{...P,width:"min(90vw,500px)",marginBottom:16}}>
        <div style={{fontSize:13,color:"rgba(255,255,255,.5)",marginBottom:8,fontWeight:700}}>公司名称</div>
        <input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="例如：星辰科技..." maxLength={20} style={{width:"100%",padding:"12px 16px",borderRadius:12,boxSizing:"border-box",border:"2px solid rgba(255,255,255,.15)",background:"rgba(255,255,255,.08)",color:"#fff",fontSize:16,fontFamily:"inherit",outline:"none"}}/>
      </div>
      <div style={{width:"min(90vw,500px)"}}>
        <div style={{fontSize:13,color:"rgba(255,255,255,.5)",marginBottom:12,fontWeight:700,textAlign:"center"}}>选择赛道</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10}}>
          {INDUSTRIES.map((x,i)=>(<div key={x.id} className="ic" onClick={()=>{if(!name.trim())setName("创新科技");startGame(x);}} style={{...P,padding:14,position:"relative",animation:`fadeIn .3s ${.03*i}s both`}}>
            {x.hot&&<div style={{position:"absolute",top:8,right:8,background:"linear-gradient(135deg,#ef4444,#f97316)",color:"#fff",fontSize:9,padding:"2px 6px",borderRadius:6,fontWeight:800}}>🔥</div>}
            <div style={{fontSize:28,marginBottom:4}}>{x.icon}</div>
            <div style={{fontSize:14,fontWeight:800}}>{x.name}</div>
            <div style={{fontSize:11,color:"rgba(255,255,255,.4)",lineHeight:1.4}}>{x.desc}</div>
            <div style={{fontSize:10,color:"rgba(255,255,255,.3)",marginTop:4}}>{x.difficulty}</div>
          </div>))}
        </div>
      </div>
    </div>
  );

  if(phase==="playing")return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0a0a1a,#1a1a3e,#0d1b2a)",color:"#fff",fontFamily:"'Nunito',system-ui,sans-serif",display:"flex",flexDirection:"column",alignItems:"center",padding:16}}>
      <style>{CSS}</style>
      {popup&&popup.type==="milestone"&&<Popup onClose={()=>setPopup(null)} border="#fbbf24"><div style={{fontSize:48,marginBottom:8}}>🏆</div><div style={{fontSize:18,fontWeight:900,color:"#fbbf24",marginBottom:4}}>里程碑！</div><div style={{fontSize:15,color:"rgba(255,255,255,.8)",fontWeight:700}}>{popup.text}</div></Popup>}
      {popup&&popup.type==="purchase"&&<Popup onClose={()=>setPopup(null)} border="#818cf8"><div style={{fontSize:56,marginBottom:8}}>{popup.icon}</div><div style={{fontSize:16,fontWeight:900,color:"#818cf8",marginBottom:4}}>成功购入！</div><div style={{fontSize:20,color:"#fff",fontWeight:800}}>{popup.name}</div><div style={{fontSize:12,color:"rgba(255,255,255,.5)",marginTop:4}}>{popup.desc}</div><div style={{fontSize:13,color:"#ef4444",marginTop:6,fontWeight:700}}>-¥{fmt(popup.cost)}</div></Popup>}
      {showSurv&&<div style={{position:"fixed",inset:0,display:"flex",alignItems:"center",justifyContent:"center",zIndex:998,background:"rgba(0,0,0,.7)",backdropFilter:"blur(5px)"}}><div style={{width:"min(90vw,440px)",...P,padding:24,animation:"fadeIn .4s",border:"2px solid rgba(239,68,68,.3)"}}><div style={{textAlign:"center",marginBottom:16}}><div style={{fontSize:40}}>🆘</div><div style={{fontSize:18,fontWeight:900,color:"#ef4444"}}>现金告急！</div><div style={{fontSize:12,color:"rgba(255,255,255,.4)",marginTop:4}}>负债¥{fmt(debt)} 已续命{survCnt}次</div></div><div style={{display:"flex",flexDirection:"column",gap:8,maxHeight:300,overflowY:"auto"}}>{SURV.map((o,i)=>{if(o.ct==="sellH"&&ownedH.tier<=1)return null;if(o.ct==="sellC"&&ownedC.tier<=0)return null;const ok=conn>=o.cq&&rep>=o.rq;const amt=o.ct==="sellH"?(HOUSING_TIERS[ownedH.tier].items[ownedH.item].cost*0.7||50000):o.ct==="sellC"?(CAR_TIERS[ownedC.tier].items[ownedC.item].cost*0.6||20000):(bg?.borrow||100000)*(o.am||1)*(1+fr*0.5);return(<div key={i} className={ok?"ob":""} onClick={()=>ok&&execSurv(o)} style={{...P,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",borderColor:ok?"rgba(239,68,68,.3)":"rgba(255,255,255,.06)",opacity:ok?1:.4,cursor:ok?"pointer":"default"}}><div><div style={{fontSize:14,fontWeight:800}}>{o.i}{o.n}</div><div style={{fontSize:11,color:"rgba(255,255,255,.45)"}}>{o.d}</div>{!ok&&<div style={{fontSize:10,color:"#ef4444"}}>需人脉≥{o.cq} 口碑≥{o.rq}</div>}</div><div style={{fontSize:14,fontWeight:800,color:"#34d399",marginLeft:10}}>+¥{fmt(amt)}</div></div>);}).filter(Boolean)}</div></div></div>}
      {/* Header */}
      <div style={{width:"min(92vw,520px)",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div><div style={{fontSize:"clamp(15px,4vw,19px)",fontWeight:900}}>{ind?.icon} {name}</div>
          <div style={{fontSize:11,color:"rgba(255,255,255,.4)"}}>{stage.icon} {stage.name}·第{mo}月·{["未融资","天使轮","A轮","B轮","C轮","已IPO"][fr]}</div>
          <div style={{fontSize:10,color:bg?.color,opacity:.7}}>{bg?.icon} {bg?.name}·{bg?.trait}</div>
        </div>
        <div style={{textAlign:"right"}}><div style={{fontSize:11,color:"rgba(255,255,255,.4)"}}>估值</div><div style={{fontSize:16,fontWeight:800,color:"#818cf8"}}>¥{fmt(val)}</div><div style={{fontSize:10,color:"rgba(255,255,255,.3)"}}>持股{eq.toFixed(1)}%</div>{debt>0&&<div style={{fontSize:10,color:"#ef4444"}}>负债¥{fmt(debt)}</div>}</div>
      </div>
      {/* Stats */}
      <div style={{width:"min(92vw,520px)",display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6,marginBottom:6}}>
        {[{l:"现金",v:cash,i:"💰",c:cash<team*36000?"#ef4444":"#34d399",p:"¥"},{l:"用户",v:users,i:"👥",c:"#818cf8"},{l:"团队",v:team,i:"👨‍💻",c:"#fb923c"},{l:"口碑",v:Math.round(rep),i:"⭐",c:rep<30?"#ef4444":"#fbbf24"},{l:"人脉",v:Math.round(conn),i:"🤝",c:conn>50?"#a78bfa":"#94a3b8"}].map((s,i)=>(
          <div key={i} style={{...P,padding:"8px 4px",textAlign:"center"}}><div style={{fontSize:16}}>{s.i}</div><AnimNum value={s.v} prefix={s.p||""} color={s.c}/><div style={{fontSize:9,color:"rgba(255,255,255,.3)"}}>{s.l}</div></div>))}
      </div>
      {/* Life status bar */}
      <div style={{width:"min(92vw,520px)",display:"flex",gap:6,marginBottom:6}}>
        {[{icon:HOUSING_TIERS[ownedH.tier].icon,name:curH.name},{icon:CAR_TIERS[ownedC.tier].icon,name:curC.name},{icon:LIFE_TIERS[ownedL.tier].icon,name:curL.name}].map((x,i)=>(
          <div key={i} style={{flex:1,...P,padding:"5px 8px",display:"flex",alignItems:"center",gap:4}}><span style={{fontSize:14}}>{x.icon}</span><span style={{fontSize:10,color:"rgba(255,255,255,.5)",fontWeight:700,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{x.name}</span></div>))}
      </div>
      <div style={{width:"min(92vw,520px)",display:"flex",gap:8,marginBottom:10}}>
        <div style={{flex:1,fontSize:10,color:"rgba(255,255,255,.25)",textAlign:"center"}}>月支出¥{fmt(team*12000)}·可维持{Math.max(0,Math.floor(cash/(team*12000)))}月</div>
        <button onClick={()=>setShowShop(!showShop)} style={{background:showShop?"rgba(129,140,248,.2)":"rgba(255,255,255,.08)",border:"1px solid rgba(255,255,255,.15)",color:showShop?"#818cf8":"rgba(255,255,255,.5)",padding:"4px 12px",borderRadius:8,fontSize:11,cursor:"pointer",fontFamily:"inherit",fontWeight:700,whiteSpace:"nowrap"}}>🛍️{showShop?"收起":"升级生活"}</button>
      </div>
      {showShop&&renderShop()}
      {/* Competitors */}
      <div style={{width:"min(92vw,520px)",marginBottom:10}}>
        <div style={{fontSize:11,color:"rgba(255,255,255,.3)",marginBottom:6,fontWeight:700}}>🏆 竞争</div>
        <div style={{display:"flex",gap:5}}>
          <div style={{flex:1,...P,padding:"7px 8px",borderColor:"rgba(129,140,248,.3)"}}><div style={{fontSize:11,fontWeight:800,color:"#818cf8"}}>🏅{name}</div><div style={{fontSize:10,color:"rgba(255,255,255,.4)"}}>{fmtU(users)}用户</div></div>
          {comps.map((c,i)=><div key={i} style={{flex:1,...P,padding:"7px 8px"}}><div style={{fontSize:10,fontWeight:700,color:"rgba(255,255,255,.5)"}}>{c.name}</div><div style={{fontSize:10,color:"rgba(255,255,255,.3)"}}>{fmtU(c.users)}</div></div>)}
        </div>
      </div>
      {/* Event */}
      <div style={{width:"min(92vw,520px)",marginBottom:12}}>
        {loading?(<div style={{...P,padding:"40px 20px",textAlign:"center"}}><div style={{fontSize:32,marginBottom:12}}>📮</div><div style={{color:"rgba(255,255,255,.6)",fontSize:14,fontWeight:700}}>第{mo}个月</div><div style={{marginTop:8,fontSize:12,color:"rgba(255,255,255,.3)"}}>生成中<span style={{animation:"dot 1s infinite"}}>.</span><span style={{animation:"dot 1s infinite .3s"}}>.</span><span style={{animation:"dot 1s infinite .6s"}}>.</span></div></div>
        ):evt?(<div style={{...P,animation:"fadeIn .5s",borderColor:({crisis:"rgba(239,68,68,.3)",opportunity:"rgba(52,211,153,.3)",funding:"rgba(129,140,248,.3)",family:"rgba(251,191,36,.3)",competitor:"rgba(249,115,22,.3)",newCompetitor:"rgba(225,29,72,.3)"})[evt.type]||"rgba(255,255,255,.1)"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}><span style={{fontSize:32}}>{evt.emoji}</span><div><div style={{fontSize:10,fontWeight:700,color:({crisis:"#ef4444",opportunity:"#34d399",funding:"#818cf8",family:"#fbbf24",competitor:"#f97316",newCompetitor:"#e11d48",decision:"#a78bfa"})[evt.type]||"#a78bfa",marginBottom:2}}>{({crisis:"⚠️危机",opportunity:"💡机遇",decision:"🤔决策",competitor:"⚔️竞争",newCompetitor:"🆕新对手入场",funding:"💰融资",family:"👨‍👩‍👧家庭"})[evt.type]||"📋事件"}</div><div style={{fontSize:18,fontWeight:900}}>{evt.title}</div></div></div>
          <div style={{fontSize:14,color:"rgba(255,255,255,.7)",lineHeight:1.8,marginBottom:16,padding:"12px 14px",background:"rgba(255,255,255,.04)",borderRadius:10}}>{evt.description}</div>
        {evt.multiSelect&&<div style={{fontSize:12,color:"#a78bfa",marginBottom:8,fontWeight:700,textAlign:"center"}}>🔀 可多选，但贪心有代价…</div>}
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {evt.options?.map((o,i)=>(<div key={i} className="ob" onClick={()=>evt.multiSelect?setSelOpts(p=>{const n=new Set(p);n.has(i)?n.delete(i):n.add(i);return n;}):decide([o])} style={{...P,padding:"14px 16px",borderColor:evt.multiSelect&&selOpts.has(i)?"rgba(129,140,248,.6)":"rgba(255,255,255,.12)",background:evt.multiSelect&&selOpts.has(i)?"rgba(129,140,248,.1)":"transparent",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{flex:1}}><div style={{fontSize:14,fontWeight:800,marginBottom:3}}>{evt.multiSelect?(selOpts.has(i)?"☑️":"⬜"):["🅰️","🅱️","🅲️"][i]} {o.text}</div><div style={{fontSize:12,color:"rgba(255,255,255,.45)",lineHeight:1.5}}>{o.detail}</div></div>
              <div style={{fontSize:10,padding:"3px 8px",borderRadius:6,marginLeft:8,whiteSpace:"nowrap",fontWeight:700,background:o.risk==="high"?"rgba(239,68,68,.2)":o.risk==="medium"?"rgba(251,191,36,.2)":"rgba(52,211,153,.2)",color:o.risk==="high"?"#fca5a5":o.risk==="medium"?"#fde68a":"#6ee7b7"}}>{{low:"低风险",medium:"中风险",high:"高风险"}[o.risk]||"?"}</div>
            </div>))}
          </div>
        </div>):null}
      </div>
      {miles.length>0&&<div style={{width:"min(92vw,520px)",marginBottom:8,fontSize:12,color:"#fbbf24",fontWeight:700,textAlign:"center"}}>🏆{miles[miles.length-1].text}</div>}
      <button onClick={()=>setShowHist(!showHist)} style={{background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",color:"rgba(255,255,255,.5)",padding:"8px 20px",borderRadius:10,fontSize:12,cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>{showHist?"收起":"📜历程"}({history.length})</button>
      {showHist&&history.length>0&&<div style={{width:"min(92vw,520px)",marginTop:10,...P,maxHeight:250,overflowY:"auto",padding:12}}>{history.slice().reverse().map((e,i)=><div key={i} style={{fontSize:12,color:"rgba(255,255,255,.5)",padding:"6px 0",borderBottom:i<history.length-1?"1px solid rgba(255,255,255,.06)":"none"}}><span style={{color:({family:"#fbbf24",crisis:"#ef4444",opportunity:"#34d399",funding:"#818cf8",competitor:"#f97316",newCompetitor:"#e11d48"})[e.type]||"rgba(255,255,255,.3)"}}>{e.emoji}第{e.mo}月</span> {e.title}→<span style={{color:"#818cf8"}}>{e.choice}</span></div>)}</div>}
    </div>
  );

  if(phase==="gameover")return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#1a0a0a,#2a1515,#1a0a0a)",color:"#fff",fontFamily:"'Nunito',system-ui,sans-serif",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,textAlign:"center"}}>
      <style>{CSS}</style>
      <div style={{animation:"fadeIn .6s"}}><div style={{fontSize:64,marginBottom:16}}>💸</div>
        <h2 style={{fontSize:28,fontWeight:900,color:"#ef4444",margin:"0 0 8px"}}>创业失败</h2>
        <p style={{color:"rgba(255,255,255,.5)",fontSize:14,marginBottom:20}}>{overMsg}</p>
        <div style={{...P,padding:20,maxWidth:380,margin:"0 auto 24px",textAlign:"left"}}><div style={{fontSize:13,color:"rgba(255,255,255,.6)",lineHeight:2.2}}>
          {bg?.icon}{bg?.name}→{ind?.icon}{name}<br/>📅{mo}月 👥{fmtU(users)} {team}人<br/>💰{["未融资","天使轮","A轮","B轮","C轮","IPO"][fr]}<br/>🚗{curC.name} 🏠{curH.name}<br/>🏆{miles.length}个里程碑</div></div>
        <div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}}>
          <button onClick={()=>setPhase("menu")} style={{padding:"14px 32px",fontSize:15,fontWeight:800,color:"#fff",background:"linear-gradient(135deg,#ef4444,#dc2626)",border:"none",borderRadius:14,cursor:"pointer",fontFamily:"inherit"}}>😤东山再起</button>
          <button onClick={()=>navigator.clipboard?.writeText(`🚀创业人生\n${bg?.icon}${bg?.name}→${ind?.icon}${name}\n坚持${mo}月后破产💸\n🚗${curC.name} 🏠${curH.name}\n你能更好吗？`)} style={{padding:"14px 32px",fontSize:15,fontWeight:800,color:"rgba(255,255,255,.6)",background:"transparent",border:"2px solid rgba(255,255,255,.2)",borderRadius:14,cursor:"pointer",fontFamily:"inherit"}}>📤分享</button>
        </div></div>
    </div>
  );

  if(phase==="won")return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0a1a0a,#1a2e1a,#0a1a2e)",color:"#fff",fontFamily:"'Nunito',system-ui,sans-serif",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,textAlign:"center"}}>
      <style>{CSS}</style>
      {Array.from({length:15}).map((_,i)=><div key={i} style={{position:"fixed",left:`${Math.random()*100}%`,top:-20,fontSize:20,animation:`confetti ${3+Math.random()*3}s linear ${Math.random()*2}s infinite`,pointerEvents:"none"}}>{["🎉","🎊","✨","🌟","🔔","💰"][i%6]}</div>)}
      <div style={{animation:"fadeIn .6s",position:"relative",zIndex:1}}><div style={{fontSize:64,marginBottom:16}}>🔔</div>
        <h2 style={{fontSize:32,fontWeight:900,margin:"0 0 8px",background:"linear-gradient(135deg,#fbbf24,#f59e0b)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>成功上市！</h2>
        <p style={{color:"rgba(255,255,255,.6)",fontSize:16,marginBottom:24}}>「{name}」IPO🎉</p>
        <div style={{...P,padding:20,maxWidth:400,margin:"0 auto 24px",textAlign:"left"}}><div style={{fontSize:14,color:"rgba(255,255,255,.7)",lineHeight:2.2}}>
          {bg?.icon}{bg?.name}({bg?.trait})→{ind?.icon}{name}<br/>📅{mo}月 💰¥{fmt(val)} 持股{eq.toFixed(1)}%<br/>👥{fmtU(users)}用户 {team}人 ⭐{Math.round(rep)}<br/>🚗{curC.name} 🏠{curH.name} 🍽️{curL.name}<br/>🏆{miles.length}个里程碑</div></div>
        <div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}}>
          <button onClick={()=>setPhase("menu")} style={{padding:"14px 32px",fontSize:15,fontWeight:800,color:"#0a0a1a",background:"linear-gradient(135deg,#fbbf24,#f59e0b)",border:"none",borderRadius:14,cursor:"pointer",fontFamily:"inherit"}}>🚀再创辉煌</button>
          <button onClick={()=>navigator.clipboard?.writeText(`🚀创业人生🔔\n${bg?.icon}${bg?.name}→${mo}月IPO！\n「${name}」估值¥${fmt(val)}\n🚗${curC.name} 🏠${curH.name} 🍽️${curL.name}\n从${bg?.name}到CEO的逆袭！`)} style={{padding:"14px 32px",fontSize:15,fontWeight:800,color:"#fbbf24",background:"transparent",border:"2px solid rgba(251,191,36,.4)",borderRadius:14,cursor:"pointer",fontFamily:"inherit"}}>📤敲钟炫耀</button>
        </div></div>
    </div>
  );
  return null;
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(StartupLife));</script></body></html>
